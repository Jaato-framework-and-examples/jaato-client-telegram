# Profile for the Telegram bot's per-chat sessions.
# Selected via jaato_ws.profile=telegram_chat in the bot config, passed as
# `--profile telegram_chat` at session.new. The persona lives in
# .jaato/agents/telegram_chat.md (passed as `--agent telegram_chat`).
name: telegram_chat
description: Conversational assistant for the Telegram bot client.
provider: zhipuai
model: glm-5-turbo
# Confine the runner to its workspace: it can read/write the workspace (incl.
# tool_drafts/) but NOT .jaato/agents, .jaato/profiles, or .jaato/host_tools.
# Dynamic host tools are installed into .jaato/host_tools by the UNCONFINED bot
# process after user approval — the confined runner cannot self-install code.
apparmor: true
# V2 cross-provider model tiers: cheap zhipuai glm-5-turbo for text (the
# `executor` / initial tier) + a REAL vision tier on OpenRouter
# google/gemini-2.5-flash (zhipuai glm-4.5v hallucinates, so it's not used).
# When a user-message image arrives, the content gate nudges the agent to
# enter_tier('vision'); switch_tier swaps to the cached gemini provider that
# actually sees the image, then switches back. The OpenRouter key is resolved
# from the GPG `pass` store via the pass:// secret URI in plugin_configs below
# (the daemon resolves it; the key is never inlined here).
model_tiers:
  # Pin the provider explicitly: switching BACK from a tier that set its own
  # provider (vision -> openrouter) would otherwise inherit openrouter and try the
  # non-existent openrouter/glm-5-turbo (404), failing enter_tier('executor') and
  # hanging the turn. Each tier names its own provider, like vision does.
  executor:
    model: glm-5-turbo
    provider: zhipuai
  vision:
    model: google/gemini-2.5-flash
    provider: openrouter
  initial: executor
  # fallback must name a DECLARED tier (default is 'dispatcher', which we don't
  # declare — leaving it unset makes the runner reject the whole tier config and
  # silently drop to single-model mode, so the vision tier never exists).
  fallback: executor
# permission / reliability / lifecycle are always-on; host tools are registered
# client-side via tools.register_client, independent of this list.
# NOTE: cli / interactive_shell / file_edit grant shell + file access on the
# SERVER host — execution is gated by the permission plugin (button approval)
# and the bot whitelist. Consider apparmor: true for a user-facing deployment.
plugins:
  - clarification
  # knowledge / web
  - web_search
  - web_fetch
  - references
  - result_grep
  # memory + waypoint
  - memory
  - waypoint
  # code / files
  - file_edit
  - filesystem_query
  - ast_search
  - lsp
  - cli
  - interactive_shell
  - notebook
  # orchestration
  - subagent
  - flow_tools
  - template
  - prompt_library
  - profile_tools
  - session_ops
  # environment
  - environment
# Chat-style turns; the bot streams output and surfaces tool/permission/
# clarification UIs over the WS protocol.
max_turns: 12
plugin_configs:
  zhipuai:
    api_params:
      temperature: 0.7
  openrouter:
    # OpenRouter key for the vision tier — the intended provider-config surface,
    # resolved daemon-side from the GPG `pass` store (HOME-matched; doctor
    # --secret confirms it resolves). Never inline the raw key here.
    api_key: "pass://jaato/openrouter/api-key"
